<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Multi-Script Tabs</title>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 20px auto; }
    .tabs { display: flex; gap: 8px; margin-bottom: 10px; }
    .tab {
      padding: 6px 12px;
      border: 1px solid #ccc;
      cursor: pointer;
      border-bottom: none;
      background: #eee;
    }
    .tab.active { background: #fff; font-weight: bold; }
    .panel {
      border: 1px solid #ccc;
      padding: 10px;
    }
    textarea {
      width: 100%;
      height: 200px;
      font-family: monospace;
    }
    .buttons { margin-top: 10px; display: flex; gap: 8px; }
  </style>
</head>
<body>
  <h1>ESP32-S3 Script Runner</h1>

  <div class="tabs">
    <div class="tab active" data-target="script1">Script 1</div>
    <div class="tab" data-target="script2">Script 2</div>
    <div class="tab" data-target="script3">Script 3</div>
  </div>

  <div class="panel">
    <textarea id="script1" class="script-area">// Script 1 here</textarea>
    <textarea id="script2" class="script-area" style="display:none;">// Script 2 here</textarea>
    <textarea id="script3" class="script-area" style="display:none;">// Script 3 here</textarea>

    <div class="buttons">
      <button id="run">Run current script</button>
      <button id="save">Save current script</button>
    </div>
  </div>

  <script>
    const tabs = document.querySelectorAll('.tab');
    const areas = document.querySelectorAll('.script-area');
    let currentId = 'script1';

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        // Switch active tab
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        // Show corresponding textarea
        currentId = tab.dataset.target;
        areas.forEach(a => {
          a.style.display = (a.id === currentId) ? 'block' : 'none';
        });
      });
    });

    document.getElementById('run').addEventListener('click', () => {
      const code = document.getElementById(currentId).value;
      console.log('Run script from', currentId, ':\n', code);
      // Here is where you hook into Web Serial:
      // await writer.write(enc.encode(code));
    });

    document.getElementById('save').addEventListener('click', () => {
      const code = document.getElementById(currentId).value;
      const blob = new Blob([code], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = currentId + '.txt';
      a.click();
      URL.revokeObjectURL(a.href);
    });
  </script>
</body>
</html>
